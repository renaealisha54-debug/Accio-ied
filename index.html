<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Accio IDE</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            height: 100vh;
            overflow: hidden;
        }
        #app { display: flex; flexDirection: column; height: 100%; }
        header {
            background: #161b22;
            padding: 12px 16px;
            borderBottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 { font-size: 18px; font-weight: 600; }
        #editor-section { flex: 1; display: flex; flexDirection: column; padding: 8px; }
        #code-editor {
            flex: 1;
            background: #0d1117;
            color: #c9d1d9;
            border: 1px solid #30363d;
            borderRadius: 6px;
            padding: 12px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            resize: none;
            outline: none;
        }
        #code-editor:focus { borderColor: #58a6ff; }
        .toolbar {
            display: flex;
            gap: 8px;
            padding: 12px;
            background: #161b22;
            overflowX: auto;
        }
        button {
            background: #238636;
            color: white;
            border: none;
            padding: 10px 16px;
            borderRadius: 6px;
            font-size: 14px;
            font-weight: 500;
        }
        button:active { transform: scale(0.98); }
        .btn-secondary { background: #30363d; }
        #terminal-output {
            height: 150px;
            background: #0d1117;
            borderTop: 1px solid #30363d;
            padding: 8px;
            overflowY: auto;
            font-family: monospace;
            font-size: 12px;
        }
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal {
            background: #161b22;
            borderRadius: 8px;
            padding: 24px;
            max-width: 90%;
            width: 400px;
        }
        #symbol-bar {
            display: flex;
            overflowX: auto;
            background: #161b22;
            padding: 8px;
            gap: 6px;
            borderBottom: 1px solid #30363d;
        }
        #symbol-bar button {
            min-width: 36px;
            height: 36px;
            background: #30363d;
            padding: 0;
        }
        #storage-usage {
            font-size: 12px;
            color: #8b949e;
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <h1>Accio IDE</h1>
            <span id="storage-usage">Cache: 0KB</span>
        </header>
        
        <div id="editor-section">
            <div id="symbol-bar"></div>
            <textarea id="code-editor" placeholder="// Write your JavaScript code here..." spellcheck="false"></textarea>
        </div>
        
        <div class="toolbar">
            <button onclick="handleAction('RUN')">Run</button>
            <button onclick="handleAction('BUILD')" class="btn-secondary">Build</button>
            <button onclick="handleAction('STORAGE')" class="btn-secondary">Storage</button>
        </div>
        
        <div id="terminal-output">> Console ready...</div>
    </div>
    
    <!-- Storage Modal -->
    <div id="storage-modal" class="modal-overlay">
        <div class="modal">
            <h2>Storage</h2>
            <p id="storage-details"></p>
            <button onclick="closeModals()" class="btn-secondary">Close</button>
        </div>
    </div>
    
    <!-- Build Modal -->
    <div id="build-modal" class="modal-overlay">
        <div class="modal">
            <h2>Building...</h2>
            <div id="build-progress-bar" style="height: 4px; background: #238636; width: 0%;"></div>
            <p id="build-step">Initializing...</p>
            <div id="build-actions" style="display: none;">
                <p>Build Successful!</p>
                <button onclick="closeModals()">Done</button>
            </div>
        </div>
    </div>

    <script src="project-manager.js"></script>
    <script src="compiler.js"></script>
    <script src="terminal.js"></script>
    <script src="keyboard-bridge.js"></script>
    <script src="main.js"></script>
    <script>
        // Initialize app when DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof ProjectManager !== 'undefined') {
                const saved = ProjectManager.load();
                if (saved) document.getElementById('code-editor').value = saved;
                ProjectManager.updateStorageLabel();
            }
            if (typeof KeyboardBridge !== 'undefined') {
                KeyboardBridge.init();
            }
        });
    </script>
</body>
</html>
